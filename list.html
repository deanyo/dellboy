<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1621">
  <title>del boy's drinks - list</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256' viewBox='0 0 256 256'><rect width='256' height='256' fill='%231a1621'/><text x='128' y='155' text-anchor='middle' font-family='JetBrains%20Mono,monospace' font-size='96' font-weight='600' fill='%23b3f4f3'>🍸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>del boy's drinks</h1>
      <p class="subtitle">every cocktail from only fools and horses</p>
      <nav class="nav-tabs">
        <a href="index.html" class="nav-btn">🎰 spin</a>
        <a href="list.html" class="nav-btn active">📋 list</a>
        <a href="generator.html" class="nav-btn">🧪 generator</a>
      </nav>
      <div class="hero-tag">
        <span class="dot"></span>
        <span id="drink-count"></span>
      </div>
    </header>

    <div class="filters">
      <input type="text" id="search" class="search-input" placeholder="search drinks...">
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">all</button>
        <button class="filter-btn" data-filter="confirmed">confirmed</button>
        <button class="filter-btn" data-filter="community">unconfirmed</button>
      </div>
    </div>

    <div id="drinks-grid"></div>

    <footer class="footer">
      <a href="https://github.com/deanyo/dellboy" target="_blank">src</a>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
