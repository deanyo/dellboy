<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1621">
  <title>del boy's drinks - generator</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256' viewBox='0 0 256 256'><rect width='256' height='256' fill='%231a1621'/><text x='128' y='155' text-anchor='middle' font-family='JetBrains%20Mono,monospace' font-size='96' font-weight='600' fill='%23b3f4f3'>🍸</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>del boy's drinks</h1>
      <p class="subtitle">the del boy drink generator</p>
      <nav class="nav-tabs">
        <a href="index.html" class="nav-btn">🎰 spin</a>
        <a href="list.html" class="nav-btn">📋 list</a>
        <a href="generator.html" class="nav-btn active">🧪 generator</a>
      </nav>
    </header>

    <div class="generator-container">
      <div id="gen-result" class="gen-card">
        <div class="gen-drink" id="gen-drink">press the button, you plonker</div>
        <div class="gen-desc" id="gen-desc"></div>
        <div class="gen-quote" id="gen-quote"></div>
      </div>
      <button id="gen-btn" class="spin-button">what's del drinking?</button>
    </div>

    <div id="gen-history" class="gen-history"></div>

    <footer class="footer">
      <a href="https://github.com/deanyo/dellboy" target="_blank">src</a>
    </footer>
  </div>

  <script src="generator.js"></script>
  <script>
    const history = [];
    document.getElementById('gen-btn').addEventListener('click', () => {
      const d = generateDrink();
      document.getElementById('gen-drink').textContent = d.name;
      document.getElementById('gen-desc').textContent = d.description;
      document.getElementById('gen-quote').textContent = `"${d.quote}"`;
      document.getElementById('gen-result').classList.add('gen-active');

      history.unshift(d);
      if (history.length > 10) history.pop();
      document.getElementById('gen-history').innerHTML =
        '<div class="gen-history-title">previous rounds</div>' +
        history.slice(1).map(h =>
          `<div class="gen-history-item">${h.name}</div>`
        ).join('');
    });
  </script>
</body>
</html>
